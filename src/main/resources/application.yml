server:
  port: 8080

spring:
  application:
    name: quiz-portal
  
  datasource:
    url: jdbc:h2:file:./data/quizdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# Spring profiles for swapping to PostgreSQL if necessary
---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/quizdb}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
